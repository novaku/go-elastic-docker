# ─────────────────────────────────────────────────────────────────
# Local development stack
# Usage:
#   docker compose up -d          # start all services
#   docker compose logs -f api    # tail API logs
#   docker compose down -v        # tear down + remove volumes
# ─────────────────────────────────────────────────────────────────

services:

  # ── Elasticsearch ─────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    container_name: es_dev
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false           # dev only — enable in prod
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=dev-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - es_data_dev:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - elastic_net

  # ── Kibana (local dashboard) ───────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.3
    container_name: kibana_dev
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
      - SERVER_HOST=0.0.0.0
    ports:
      - "5601:5601"
    networks:
      - elastic_net

  # ── Go API ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_dev
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_PORT=8080
      - APP_NAME=go-elastic-search
      - ES_ADDRESSES=http://elasticsearch:9200
      - ES_USERNAME=
      - ES_PASSWORD=
      - READ_TIMEOUT_SECONDS=10
      - WRITE_TIMEOUT_SECONDS=30
      - CORS_ALLOWED_ORIGINS=*
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - elastic_net

volumes:
  es_data_dev:

networks:
  elastic_net:
    driver: bridge
