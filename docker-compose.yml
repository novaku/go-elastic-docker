# ─────────────────────────────────────────────────────────────────
# Local development stack
# Usage:
#   docker compose up -d          # start all services
#   docker compose logs -f api    # tail API logs
#   docker compose down -v        # tear down + remove volumes
# ─────────────────────────────────────────────────────────────────

services:

  # ── Elasticsearch ─────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    container_name: es_dev
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false           # dev only — enable in prod
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - cluster.name=dev-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - es_data_dev:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - elastic_net

  # ── Go API ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_dev
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - APP_ENV=local
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      disable: true
    networks:
      - elastic_net

volumes:
  es_data_dev:

networks:
  elastic_net:
    driver: bridge
